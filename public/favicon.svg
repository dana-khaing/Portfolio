<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark purple background -->
  <rect width="32" height="32" rx="5" fill="#0d0a1a"/>
  <!-- Outer glow ring -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#a855f7" stroke-width="0.5" opacity="0.4"/>
  <!-- ✦ four-pointed star -->
  <path d="M16,3 L18.8,13 L29,16 L18.8,19 L16,29 L13.2,19 L3,16 L13.2,13 Z"
        fill="#a855f7" opacity="0.25"/>
  <path d="M16,3 L18.8,13 L29,16 L18.8,19 L16,29 L13.2,19 L3,16 L13.2,13 Z"
        fill="none" stroke="#a855f7" stroke-width="1" stroke-linejoin="round"/>
  <!-- Bright centre dot -->
  <circle cx="16" cy="16" r="2.5" fill="#c084fc"/>
  <!-- Inner cross lines for sparkle feel -->
  <line x1="16" y1="10" x2="16" y2="22" stroke="#c084fc" stroke-width="0.8" opacity="0.5"/>
  <line x1="10" y1="16" x2="22" y2="16" stroke="#c084fc" stroke-width="0.8" opacity="0.5"/>
</svg>
